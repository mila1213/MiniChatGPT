<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniGPT HF</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="brand">🤗</div>
      <h1>MiniGPT HF</h1>
      <p>Chat educativo conectado a Hugging Face mediante un backend Node.js.</p>
      <button id="clearBtn">Limpiar chat</button>
    </section>

    <section class="chat">
      <div id="messages" class="messages"></div>

      <form id="chatForm" class="composer">
        <textarea id="prompt" placeholder="Escribe tu pregunta..." rows="2"></textarea>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>v
